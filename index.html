<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>הפנקס</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ─────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #09090e;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(255,255,255,0.15);
      --text: #e2d9cc;
      --text-dim: rgba(226,217,204,0.45);
      --accent: #b8986a;
      --accent-glow: rgba(184,152,106,0.18);
      --font-serif: 'Cormorant Garamond', 'Georgia', serif;
      --font-sans: 'Heebo', sans-serif;
    }

    /* ── MOOD THEMES ──────────────────────────── */
    body.mood-grief    { --accent:#8c8ca0; --accent-glow:rgba(140,140,160,.15); }
    body.mood-longing  { --accent:#7d90d9; --accent-glow:rgba(125,144,217,.18); }
    body.mood-rain     { --accent:#4fa3c4; --accent-glow:rgba(79,163,196,.18); }
    body.mood-nostalgia{ --accent:#c4975a; --accent-glow:rgba(196,151,90,.18); }
    body.mood-emptiness{ --accent:#4a4a4a; --accent-glow:rgba(74,74,74,.1); }
    body.mood-anger    { --accent:#c44040; --accent-glow:rgba(196,64,64,.2); }
    body.mood-hope     { --accent:#6aadc2; --accent-glow:rgba(106,173,194,.18); }
    body.mood-love     { --accent:#c46878; --accent-glow:rgba(196,104,120,.2); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background 2s ease;
    }

    /* ── MOOD OVERLAY + GRAIN ─────────────────── */
    #mood-bg {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: background 2.5s ease, opacity 2s ease;
      background: radial-gradient(ellipse 100% 60% at 50% 0%, var(--accent-glow) 0%, transparent 70%);
    }

    #grain {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    #particle-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
      width: 100%; height: 100%;
    }

    /* ── APP SHELL ────────────────────────────── */
    #app {
      position: relative;
      z-index: 10;
      max-width: 460px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: 0 18px;
    }

    .view { display: none; }
    .view.active {
      display: block;
      animation: fadeUp 0.35s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ───────────────────────────────── */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 36px 0 28px;
    }

    .app-title {
      font-family: var(--font-serif);
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--accent);
      transition: color 1.5s ease;
      line-height: 1;
    }

    .app-subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 5px;
    }

    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all .2s ease;
    }
    .icon-btn:active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

    /* ── POEM CARDS ───────────────────────────── */
    .poems-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 110px; }

    .poem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color .25s ease, transform .2s ease, background .2s ease;
    }
    .poem-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity .3s ease;
    }
    .poem-card:active { transform: scale(0.985); background: var(--surface-hover); }
    .poem-card:active::after { opacity: 1; }

    .poem-card-title {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 7px;
      line-height: 1.25;
      transition: color .3s;
    }

    .poem-card-preview {
      font-size: 0.83rem;
      color: var(--text-dim);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .poem-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .mood-badge {
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 30px;
      border: 1px solid var(--accent);
      color: var(--accent);
      letter-spacing: 0.06em;
      transition: all 1.5s ease;
    }

    .poem-date { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.04em; }

    /* ── FAB ──────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #09090e;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      z-index: 50;
      letter-spacing: 0.1em;
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 20px rgba(0,0,0,.5);
      transition: all .3s ease;
      white-space: nowrap;
    }
    .fab:active { transform: translateX(-50%) scale(0.95); }

    /* ── POEM VIEWER ──────────────────────────── */
    .poem-view-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 30px 0 20px;
    }

    .back-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      margin-top: 4px;
      transition: all .2s ease;
    }
    .back-btn:active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

    .poem-view-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      flex: 1;
      transition: color 1.5s ease;
      color: var(--accent);
    }

    .poem-view-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .analyzing-dot {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.07em;
    }
    .analyzing-dot span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.2s infinite both;
    }
    .analyzing-dot span:nth-child(2) { animation-delay: .2s; }
    .analyzing-dot span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: .3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .poem-view-content {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 2.1;
      color: var(--text);
      white-space: pre-wrap;
      padding-bottom: 36px;
      letter-spacing: 0.01em;
    }

    .poem-divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin: 0 auto 32px;
      transition: background 1.5s ease;
    }

    .poem-actions {
      display: flex;
      gap: 10px;
      padding-bottom: 80px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all .2s ease;
    }
    .action-btn:active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
    .action-btn.danger { border-color: rgba(196,64,64,.25); color: rgba(196,64,64,.6); }
    .action-btn.danger:active { background: rgba(196,64,64,.1); border-color: rgba(196,64,64,.5); color: rgba(196,64,64,.9); }

    /* ── EDITOR ───────────────────────────────── */
    .editor-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 30px 0 24px;
    }

    .editor-heading {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--accent);
      flex: 1;
    }

    .field-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .field-group { margin-bottom: 20px; }

    .text-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s ease;
    }
    .text-input::placeholder { color: var(--text-dim); }
    .text-input:focus { border-color: var(--accent); }

    .poem-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 2;
      outline: none;
      resize: none;
      min-height: 260px;
      transition: border-color .2s ease;
    }
    .poem-textarea::placeholder { color: var(--text-dim); font-style: italic; }
    .poem-textarea:focus { border-color: var(--accent); }

    .save-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: #09090e;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.1em;
      margin-bottom: 80px;
      transition: all .2s ease;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .save-btn:active { transform: scale(0.98); opacity: .9; }
    .save-btn:disabled { opacity: .4; pointer-events: none; }

    /* ── SETTINGS SHEET ───────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s ease;
      backdrop-filter: blur(4px);
    }
    .sheet-overlay.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .sheet {
      background: #121218;
      border: 1px solid var(--border-accent);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 44px;
      width: 100%;
      max-width: 460px;
      animation: slideUp .3s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }

    .sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--border-accent);
      margin: 0 auto 20px;
    }

    .sheet-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--accent);
      margin-bottom: 22px;
    }

    .settings-note {
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 18px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    /* ── EMPTY STATE ──────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 24px 40px;
    }
    .empty-glyph {
      font-family: var(--font-serif);
      font-size: 3rem;
      color: var(--accent);
      opacity: 0.25;
      margin-bottom: 16px;
      font-style: italic;
    }
    .empty-text {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-dim);
    }

    /* ── TOAST ────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(25,25,32,.95);
      border: 1px solid var(--border-accent);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.82rem;
      color: var(--text-dim);
      z-index: 400;
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SPINNER ──────────────────────────────── */
    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(9,9,14,.2);
      border-top-color: #09090e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ATMOSPHERIC LAYERS -->
<div id="mood-bg"></div>
<div id="grain"></div>
<canvas id="particle-canvas"></canvas>

<div id="app">

  <!-- ═══ LIST VIEW ═══════════════════════════ -->
  <div id="view-list" class="view active">
    <header class="app-header">
      <div>
        <h1 class="app-title">הפנקס</h1>
        <div class="app-subtitle">שירים ורגשות</div>
      </div>
      <button class="icon-btn" onclick="showSettings()" aria-label="הגדרות">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      </button>
    </header>
    <div id="poems-container">
      <div class="empty-state">
        <div class="empty-glyph">✦</div>
        <div class="empty-text">כתוב את שירך הראשון</div>
      </div>
    </div>
  </div>

  <!-- ═══ POEM VIEWER ══════════════════════════ -->
  <div id="view-poem" class="view">
    <div class="poem-view-header">
      <button class="back-btn" onclick="showView('list')" aria-label="חזור">←</button>
      <h2 class="poem-view-title" id="viewer-title"></h2>
    </div>
    <div class="poem-view-meta">
      <span class="mood-badge" id="viewer-badge" style="display:none"></span>
      <span class="analyzing-dot" id="analyzing-indicator">
        <span></span><span></span><span></span>
        <span style="font-size:.7rem;letter-spacing:.06em;margin-right:4px;color:var(--text-dim)">מנתח מצב רוח</span>
      </span>
      <span class="poem-date" id="viewer-date"></span>
    </div>
    <div class="poem-divider"></div>
    <div class="poem-view-content" id="viewer-content"></div>
    <div class="poem-actions">
      <button class="action-btn" onclick="editCurrent()">✎ עריכה</button>
      <button class="action-btn danger" onclick="deleteCurrent()">✕ מחיקה</button>
    </div>
  </div>

  <!-- ═══ EDITOR ════════════════════════════════ -->
  <div id="view-editor" class="view">
    <div class="editor-header">
      <button class="back-btn" onclick="cancelEdit()" aria-label="חזור">←</button>
      <h2 class="editor-heading" id="editor-heading">שיר חדש</h2>
    </div>
    <div class="field-group">
      <label class="field-label" for="input-title">כותרת</label>
      <input type="text" id="input-title" class="text-input" placeholder="שם השיר...">
    </div>
    <div class="field-group">
      <label class="field-label" for="input-content">מילים</label>
      <textarea id="input-content" class="poem-textarea" placeholder="כתוב כאן...&#10;&#10;כל שורה היא עולם."></textarea>
    </div>
    <button class="save-btn" id="save-btn" onclick="savePoem()">שמור שיר</button>
  </div>

</div><!-- /#app -->

<!-- FAB -->
<button class="fab" id="fab" onclick="newPoem()">+ שיר חדש</button>

<!-- SETTINGS SHEET -->
<div class="sheet-overlay hidden" id="settings-overlay" onclick="sheetOutsideClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">הגדרות</div>
    <div class="settings-note">
      כדי לשנות את מפתח ה-OpenAI (ChatGPT) לזיהוי מצב רוח, הכנס אותו כאן.<br>
      המפתח נשמר רק במכשיר שלך.
    </div>
    <div class="field-group">
      <label class="field-label">OpenAI API Key</label>
      <input type="password" id="input-api-key" class="text-input" placeholder="sk-proj-...">
    </div>
    <button class="save-btn" onclick="saveSettings()">שמור</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── STATE ──────────────────────────────────── */
let poems        = [];
let currentId    = null;
let editingId    = null;
let activeMood   = 'default';
let pxType       = null;
let pxFrame      = null;
let pxParticles  = [];

const MOODS = {
  grief:     { label: '🖤 אבל',         px: 'ash' },
  longing:   { label: '💙 געגוע',       px: 'float' },
  rain:      { label: '🌧 גשם',          px: 'rain' },
  nostalgia: { label: '🍂 נוסטלגיה',    px: 'dust' },
  emptiness: { label: '⬜ ריקנות',       px: 'none' },
  anger:     { label: '🔴 כעס',          px: 'spark' },
  hope:      { label: '✦ תקווה',        px: 'rise' },
  love:      { label: '🌹 אהבה',         px: 'float' },
};

/* ── VIEWS ──────────────────────────────────── */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.getElementById('fab').style.display = name === 'list' ? 'block' : 'none';
  if (name === 'list') applyMood('default');
}

/* ── LOAD ───────────────────────────────────── */
window.loadPoems = async function() {
  if (!window._dbReady) { setTimeout(loadPoems, 150); return; }
  try {
    const { collection, getDocs, orderBy, query } = window._fb;
    const q     = query(collection(window._db, 'poems'), orderBy('createdAt', 'desc'));
    const snap  = await getDocs(q);
    poems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  } catch (e) {
    console.error(e);
    showToast('שגיאה בטעינת השירים');
  }
};

/* ── RENDER LIST ────────────────────────────── */
function renderList() {
  const el = document.getElementById('poems-container');
  if (!poems.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-glyph">✦</div><div class="empty-text">כתוב את שירך הראשון</div></div>`;
    return;
  }
  el.innerHTML = `<div class="poems-list">${poems.map(p => `
    <div class="poem-card" onclick="openPoem('${p.id}')">
      <div class="poem-card-title">${esc(p.title)}</div>
      <div class="poem-card-preview">${esc(p.content)}</div>
      <div class="poem-card-footer">
        ${p.mood && MOODS[p.mood] ? `<span class="mood-badge">${MOODS[p.mood].label}</span>` : '<span></span>'}
        <span class="poem-date">${fmt(p.createdAt)}</span>
      </div>
    </div>`).join('')}
  </div>`;
}

/* ── OPEN POEM ──────────────────────────────── */
window.openPoem = function(id) {
  const p = poems.find(x => x.id === id);
  if (!p) return;
  currentId = id;

  document.getElementById('viewer-title').textContent   = p.title;
  document.getElementById('viewer-content').textContent = p.content;
  document.getElementById('viewer-date').textContent    = fmt(p.createdAt);

  const badge    = document.getElementById('viewer-badge');
  const indicator= document.getElementById('analyzing-indicator');

  if (p.mood && MOODS[p.mood]) {
    badge.textContent    = MOODS[p.mood].label;
    badge.style.display  = 'inline-block';
    indicator.style.display = 'none';
    applyMood(p.mood);
  } else {
    badge.style.display  = 'none';
    indicator.style.display = 'inline-flex';
    applyMood('default');
    detectMood(p);
  }
  showView('poem');
};

/* ── AI MOOD DETECTION ──────────────────────── */
async function detectMood(p) {
  const key = localStorage.getItem('openai_key');
  if (!key) {
    document.getElementById('analyzing-indicator').style.display = 'none';
    return;
  }
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 60,
        messages: [
          { role: 'system', content: 'You analyze poem mood. Respond ONLY with valid JSON: {"mood":"X"} where X is one of: grief, longing, rain, nostalgia, emptiness, anger, hope, love. No other text.' },
          { role: 'user', content: `Poem:\nTitle: ${p.title}\n\n${p.content}` }
        ]
      })
    });
    const data = await res.json();
    const raw  = (data.choices?.[0]?.message?.content || '').replace(/```[a-z]*/g,'').trim();
    const { mood } = JSON.parse(raw);

    if (!mood || !MOODS[mood]) return;

    // Persist mood
    const { doc, updateDoc } = window._fb;
    await updateDoc(doc(window._db, 'poems', p.id), { mood });
    const local = poems.find(x => x.id === p.id);
    if (local) local.mood = mood;

    // Update UI if still viewing same poem
    if (currentId === p.id) {
      const badge = document.getElementById('viewer-badge');
      badge.textContent = MOODS[mood].label;
      badge.style.display = 'inline-block';
      document.getElementById('analyzing-indicator').style.display = 'none';
      applyMood(mood);
    }
  } catch (e) {
    console.warn('Mood detection failed:', e);
    document.getElementById('analyzing-indicator').style.display = 'none';
  }
}

/* ── CRUD ───────────────────────────────────── */
window.savePoem = async function() {
  const title   = document.getElementById('input-title').value.trim();
  const content = document.getElementById('input-content').value.trim();
  if (!title || !content) { showToast('נא למלא כותרת ותוכן'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  try {
    const { collection, addDoc, doc, updateDoc } = window._fb;
    if (editingId) {
      await updateDoc(doc(window._db, 'poems', editingId), { title, content, mood: null });
      showToast('השיר עודכן ✓');
    } else {
      await addDoc(collection(window._db, 'poems'), { title, content, mood: null, createdAt: Date.now() });
      showToast('השיר נשמר ✓');
    }
    editingId = null;
    await loadPoems();
    showView('list');
  } catch(e) { console.error(e); showToast('שגיאה בשמירה'); }

  btn.disabled  = false;
  btn.textContent = 'שמור שיר';
};

window.deleteCurrent = async function() {
  if (!currentId || !confirm('למחוק את השיר הזה?')) return;
  try {
    const { doc, deleteDoc } = window._fb;
    await deleteDoc(doc(window._db, 'poems', currentId));
    await loadPoems();
    showView('list');
    showToast('השיר נמחק');
  } catch(e) { showToast('שגיאה במחיקה'); }
};

window.editCurrent = function() {
  const p = poems.find(x => x.id === currentId);
  if (!p) return;
  editingId = currentId;
  document.getElementById('input-title').value   = p.title;
  document.getElementById('input-content').value = p.content;
  document.getElementById('editor-heading').textContent = 'עריכת שיר';
  showView('editor');
};

window.newPoem = function() {
  editingId = null;
  document.getElementById('input-title').value   = '';
  document.getElementById('input-content').value = '';
  document.getElementById('editor-heading').textContent = 'שיר חדש';
  showView('editor');
};

window.cancelEdit = function() {
  showView(editingId ? 'poem' : 'list');
};

/* ── SETTINGS ───────────────────────────────── */
window.showSettings = function() {
  document.getElementById('input-api-key').value = localStorage.getItem('openai_key') || '';
  document.getElementById('settings-overlay').classList.remove('hidden');
};
window.sheetOutsideClick = function(e) {
  if (e.target === document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').classList.add('hidden');
};
window.saveSettings = function() {
  const k = document.getElementById('input-api-key').value.trim();
  if (k) localStorage.setItem('openai_key', k);
  document.getElementById('settings-overlay').classList.add('hidden');
  showToast('ההגדרות נשמרו ✓');
};

/* ── MOOD BACKGROUNDS ───────────────────────── */
const MOOD_GLOWS = {
  default:   'rgba(184,152,106,0.18)',
  grief:     'rgba(140,140,160,0.22)',
  longing:   'rgba(125,144,217,0.24)',
  rain:      'rgba(79,163,196,0.24)',
  nostalgia: 'rgba(196,151,90,0.22)',
  emptiness: 'rgba(50,50,50,0.10)',
  anger:     'rgba(196,64,64,0.28)',
  hope:      'rgba(106,173,194,0.24)',
  love:      'rgba(196,104,120,0.28)',
};

function applyMood(mood) {
  activeMood = mood;
  document.body.className = mood !== 'default' ? `mood-${mood}` : '';
  const glow = MOOD_GLOWS[mood] || MOOD_GLOWS.default;
  document.getElementById('mood-bg').style.background =
    `radial-gradient(ellipse 120% 70% at 50% 0%, ${glow} 0%, transparent 65%)`;
  startParticles(MOODS[mood]?.px || 'none');
}

/* ── PARTICLE ENGINE ────────────────────────── */
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas();
addEventListener('resize', resizeCanvas);

const ACCENT_COLORS = {
  default:   [184,152,106],
  grief:     [140,140,160],
  longing:   [125,144,217],
  rain:      [79,163,196],
  nostalgia: [196,151,90],
  emptiness: [74,74,74],
  anger:     [196,64,64],
  hope:      [106,173,194],
  love:      [196,104,120],
};

function getColor(mood, a) {
  const c = ACCENT_COLORS[mood] || ACCENT_COLORS.default;
  return `rgba(${c[0]},${c[1]},${c[2]},${a})`;
}

function mkParticle(type, scatter) {
  const p = { type,
    x: Math.random() * canvas.width,
    y: scatter ? Math.random() * canvas.height : (type === 'rise' || type === 'float') ? canvas.height + 10 : -10
  };
  switch(type) {
    case 'rain':
      p.vx = -0.8 - Math.random()*0.6; p.vy = 9+Math.random()*7;
      p.len = 10+Math.random()*14; p.w = .5+Math.random()*.8; p.a = .15+Math.random()*.3; break;
    case 'ash':
      p.vx = (Math.random()-.5)*.4; p.vy = .4+Math.random()*.6;
      p.r = 1+Math.random()*2.5; p.a = .06+Math.random()*.12;
      p.rot = Math.random()*Math.PI*2; p.rv = (Math.random()-.5)*.025; break;
    case 'dust':
      p.vx = (Math.random()-.5)*.25; p.vy = .25+Math.random()*.45;
      p.r = 1.5+Math.random()*3; p.a = .04+Math.random()*.09; break;
    case 'float':
      p.vx = (Math.random()-.5)*.12; p.vy = -.25-Math.random()*.35;
      p.r = 1+Math.random()*1.8; p.life=0; p.maxLife=180+Math.random()*180;
      p.a=0; p.ta=.2+Math.random()*.45;
      p.y = canvas.height*.5 + (Math.random()-.5)*canvas.height; break;
    case 'rise':
      p.vx = (Math.random()-.5)*.1; p.vy = -.35-Math.random()*.25;
      p.r = .8+Math.random()*1.5; p.life=0; p.maxLife=130+Math.random()*140;
      p.a=0; p.ta=.35+Math.random()*.5;
      p.y = canvas.height - Math.random()*canvas.height*.5; break;
    case 'spark':
      p.vx = (Math.random()-.5)*1.2; p.vy = (Math.random()-.5)*1.2;
      p.r = .8+Math.random()*2; p.a = .1+Math.random()*.2;
      p.y = Math.random()*canvas.height; break;
  }
  return p;
}

function updateP(p) {
  p.x += p.vx||0; p.y += p.vy||0;
  if(p.rot !== undefined) p.rot += p.rv;
  if(p.life !== undefined) {
    p.life++;
    const h = p.maxLife/2;
    p.a = p.life < h ? (p.life/h)*p.ta : ((p.maxLife-p.life)/h)*p.ta;
    if(p.life >= p.maxLife) return false;
  }
  if(p.type==='rain'   && (p.y > canvas.height+20||p.x<-40)) return false;
  if(p.type==='ash'||p.type==='dust' && p.y > canvas.height+20) return false;
  if((p.type==='float'||p.type==='rise') && p.y < -20) return false;
  if(p.type==='spark') {
    if(p.x<0||p.x>canvas.width)  p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;
  }
  return true;
}

function drawP(p, mood) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, p.a);
  if(p.type==='rain') {
    ctx.strokeStyle = getColor(mood,.6);
    ctx.lineWidth = p.w;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.vx*2, p.y+p.len); ctx.stroke();
  } else if(p.type==='ash') {
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle = getColor(mood,.9);
    ctx.fillRect(-p.r*.4,-p.r,p.r*.8,p.r*2);
  } else {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = getColor(mood,.9); ctx.fill();
  }
  ctx.restore();
}

function startParticles(type) {
  if(pxFrame) cancelAnimationFrame(pxFrame);
  pxType = type;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!type || type==='none') { pxParticles=[]; return; }

  const count = type==='spark'?25 : type==='rain'?55 : 45;
  pxParticles = Array.from({length:count}, ()=>mkParticle(type, true));

  const moodKey = activeMood;
  (function loop() {
    if(pxType !== type) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pxParticles = pxParticles.filter(p => { const ok=updateP(p); if(ok!==false) drawP(p,moodKey); return ok!==false; });
    while(pxParticles.length < count) pxParticles.push(mkParticle(type, false));
    pxFrame = requestAnimationFrame(loop);
  })();
}

/* ── UTILS ──────────────────────────────────── */
function fmt(ts) {
  if(!ts) return '';
  return new Date(ts).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ── INIT ───────────────────────────────────── */
applyMood('default');
</script>
